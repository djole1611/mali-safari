services:
  - type: web
    name: mali-safari
    runtime: static
    buildCommand: echo "Static site - no build required"
    staticPublishPath: .
    autoDeploy: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
